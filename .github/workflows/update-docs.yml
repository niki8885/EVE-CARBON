name: Auto-update Docs

# Runs only when a version tag is pushed (e.g. v0.5.5).
# Checks out main, regenerates all docs using GitHub Models (GPT-4o),
# then commits the result back to main alongside the release.

on:
  push:
    tags:
      - 'v*'

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: .github/scripts/package.json

      - name: Install doc-updater deps
        run: npm install --prefix .github/scripts

      - name: Collect all tracked JS source files
        id: sources
        run: |
          FILES=$(git ls-files 'main.js' 'src/*.js' 'src/**/*.js' \
            | grep -v node_modules \
            | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Source files: $FILES"

      - name: Update all docs with GitHub Models (GPT-4o)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGED_FILES: ${{ steps.sources.outputs.files }}
        run: node .github/scripts/update-docs.js

      - name: Commit updated docs to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'src/docs/*.md'
          if git diff --staged --quiet; then
            echo "No doc changes — nothing to commit."
          else
            git commit -m "docs: update for ${{ github.ref_name }} [skip ci]"
            git push origin main
          fi
