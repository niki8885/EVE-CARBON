name: 💡 Feature request
description: Suggest a new feature or improvement for EVE Carbon.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Describe the problem you're trying to solve first —
        that helps us find the best solution, which may differ from the one proposed.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and this has not been requested yet.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what makes it hard or impossible today?
      placeholder: "When managing capital production I can't see ... so I have to ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Blueprints / material calculator
        - Assets & wealth tracking
        - Wallets
        - Markets
        - Planetary Interaction
        - Map / jump planner
        - Jabber (XMPP)
        - Characters / EVE SSO login
        - Cost index / industry
        - Theming / UI
        - SDE database / data sync
        - New tab / area
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or existing workarounds you've tried.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links to related EVE tools, screenshots, etc.
