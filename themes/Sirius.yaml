# ─────────────────────────────────────────────────────────────────────────────
# EVE Carbon — "Sirius" theme
#
# Named after the brightest star in the night sky.
# Primary feel: crisp white backgrounds, vivid blue accents.
# Blue replaces red as the primary accent colour.
# All EVE palette colours are adapted for high contrast on light backgrounds.
# ─────────────────────────────────────────────────────────────────────────────

name: Sirius
version: "1.0"
author: Ms Moirai
description: "Clean star-white theme with vivid blue accents. Every surface is bright; blue takes the role that crimson holds in Carbon."

# Blue is the primary accent for Sirius — red is still used for danger/null-sec.
roles:
  accent:  blue
  danger:  red
  success: green
  warning: orange
  info:    baby_blue

palette:

  # 1 ── Red (danger / null-sec / error — NOT the primary accent in Sirius)
  red:
    base:       "#c0392b"
    bright:     "#e74c3c"
    dim:        "#7b1e14"
    subtle:     "rgba(192,57,43,0.08)"
    glow:       "rgba(192,57,43,0.20)"
    border:     "rgba(192,57,43,0.25)"
    border_dim: "rgba(192,57,43,0.06)"

  # 2 ── Teal (manufacturing / online / positive — darkened for white bg)
  teal:
    base:       "#0d9488"
    bright:     "#14b8a6"
    dim:        "#0f766e"
    subtle:     "rgba(13,148,136,0.10)"
    glow:       "rgba(13,148,136,0.30)"

  # 3 ── Purple (ME research / blueprints — vivid for white bg)
  purple:
    base:       "#7c3aed"
    bright:     "#8b5cf6"
    dim:        "#5b21b6"
    subtle:     "rgba(124,58,237,0.10)"
    glow:       "rgba(124,58,237,0.20)"

  # 4 ── Pink (Pochven / null-sec alt / Sansha)
  pink:
    base:       "#be185d"
    bright:     "#db2777"
    dim:        "#9d174d"
    subtle:     "rgba(190,24,93,0.10)"
    glow:       "rgba(190,24,93,0.18)"

  # 5 ── Baby Blue (info / TE research / male char)
  baby_blue:
    base:       "#2563eb"
    bright:     "#3b82f6"
    dim:        "#1d4ed8"
    subtle:     "rgba(37,99,235,0.10)"
    glow:       "rgba(37,99,235,0.20)"

  # 6 ── Green (success / online / ESI)
  green:
    base:       "#15803d"
    bright:     "#16a34a"
    dim:        "#166534"
    subtle:     "rgba(22,163,74,0.10)"
    glow:       "rgba(22,163,74,0.25)"
    update:     "#166534"
    update_bg:  "rgba(220,252,231,0.95)"

  # 7 ── Yellow (warning / low-sec / tech-2 — darkened for white bg)
  yellow:
    base:       "#b45309"
    bright:     "#d97706"
    dim:        "#92400e"
    subtle:     "rgba(180,83,9,0.10)"
    glow:       "rgba(180,83,9,0.18)"
    lowsec:     "#b45309"

  # 8 ── Orange (invention / lowsec alt)
  orange:
    base:       "#c2410c"
    bright:     "#ea580c"
    dim:        "#9a3412"
    subtle:     "rgba(194,65,12,0.10)"
    glow:       "rgba(194,65,12,0.18)"
    warning:    "#d97706"

  # 9 ── Gold (boss badge / system highlight)
  gold:
    base:       "#b45309"
    bright:     "#d97706"
    dim:        "#92400e"
    subtle:     "rgba(180,83,9,0.10)"
    glow:       "rgba(180,83,9,0.22)"

  # 10 ── Indigo (copy BP / reverse eng / tier-2)
  indigo:
    base:       "#4338ca"
    bright:     "#4f46e5"
    dim:        "#3730a3"
    subtle:     "rgba(67,56,202,0.10)"
    glow:       "rgba(67,56,202,0.18)"

  # 11 ── Cyan (deep hi-sec / map gradient)
  cyan:
    base:       "#0891b2"
    bright:     "#06b6d4"
    dim:        "#0e7490"
    subtle:     "rgba(8,145,178,0.10)"
    glow:       "rgba(8,145,178,0.18)"

  # 12 ── Blue (PRIMARY ACCENT in Sirius — replaces crimson)
  blue:
    base:       "#1a73e8"   # vivid Google-blue, great readability on white
    bright:     "#4285f4"   # hover
    dim:        "#1557b0"   # pressed / dim
    nav_active: "rgba(26,115,232,0.12)"
    subtle:     "rgba(26,115,232,0.08)"
    glow:       "rgba(26,115,232,0.22)"
    border:     "rgba(26,115,232,0.25)"
    border_dim: "rgba(26,115,232,0.08)"
    hisec:      "#1a6fdb"

  # 13 ── Surface (all background layers — light/white)
  surface:
    body:          "#f0f4f8"               # very faintly blue-tinted white
    deep:          "rgba(224,234,248,0.95)" # titlebar / nav (slightly deeper)
    panel:         "rgba(255,255,255,0.97)" # sidebar / settings
    card:          "rgba(240,246,255,0.97)" # cards / panel blocks
    card_deep:     "rgba(230,240,255,0.97)" # deeper card / .panel
    input:         "rgba(255,255,255,0.95)" # form inputs
    modal:         "rgba(248,252,255,0.99)" # modal dialogs
    toast:         "rgba(248,252,255,0.98)" # toast notifications
    code:          "#eef2f7"               # inline code background
    hover:         "rgba(26,115,232,0.07)"  # nav button hover
    hover_subtle:  "rgba(26,115,232,0.03)"  # row hover
    banner_end:    "rgba(220,235,255,0.95)" # dashboard banner gradient end
    map:           "#0a0e1a"               # map canvas (stays dark)

  # 14 ── Text (dark on white)
  text:
    primary:    "#0d1117"   # near-black navy
    secondary:  "#24292f"   # dark grey
    tertiary:   "#57606a"   # mid grey
    header:     "#6e7781"   # panel headers
    muted:      "#8c959f"   # muted labels
    dim:        "#afb8c1"   # dim / disabled
    faint:      "#d0d7de"   # very faint separators text
    console:    "#656d76"   # console messages
    input:      "#24292f"   # form input text
    on_accent:  "#ffffff"   # text on blue buttons
    name:       "#0d1117"   # character name

  # 15 ── Line (dark subtle borders on white)
  line:
    default:    "rgba(0,0,0,0.12)"          # general border
    panel:      "rgba(26,115,232,0.25)"     # sidebar scrollbar / panel edge
    outer:      "rgba(26,115,232,0.15)"     # .panel outer border
    divider:    "#d0d7de"                   # header divider / card border
    subtle:     "rgba(0,0,0,0.04)"          # chart grid

  # 16 ── Overlay (backdrops, glows — cool blue atmosphere)
  overlay:
    backdrop:    "rgba(36,41,47,0.75)"      # modal backdrop (dark neutral)
    shadow:      "rgba(0,0,0,0.10)"
    shadow_deep: "rgba(0,0,0,0.30)"
    shadow_md:   "rgba(0,0,0,0.20)"
    hatch:       "rgba(0,0,0,0.018)"        # barely visible on white
    hatch_card:  "rgba(0,0,0,0.010)"
    dot:         "rgba(0,0,0,0.03)"        # dot pattern on white panels
    # Ambient body glows (cool blue/white — Sirius starlight)
    glow_a1:     "rgba(26,115,232,0.20)"
    glow_a2:     "rgba(100,149,237,0.12)"
    glow_a3:     "rgba(26,115,232,0.04)"
    glow_b1:     "rgba(59,130,246,0.08)"
    glow_b2:     "rgba(37,99,235,0.06)"
    # Concord ambient glow divs (subtle blue-white haze)
    concord_1:   "rgba(26,115,232,0.25)"
    concord_2:   "rgba(100,149,237,0.15)"
    concord_3:   "rgba(26,115,232,0.04)"
    concord_4:   "rgba(59,130,246,0.06)"
    concord_5:   "rgba(37,99,235,0.10)"


# ── Semantic component mappings ───────────────────────────────────────────────

ui:

  button:
    bg:           blue.base
    bg_hover:     blue.bright
    bg_pressed:   blue.dim
    bg_disabled:  surface.hover
    text:         text.on_accent
    text_disabled: text.dim
    border:       blue.base
    border_focus: blue.bright

  nav:
    bg_active:    blue.nav_active
    text_active:  text.secondary
    indicator:    teal.base
    icon_active:  blue.base

  status:
    online:       green.bright
    offline:      red.bright
    warning:      yellow.base
    info:         blue.base
    connecting:   yellow.base

  toast:
    bg:           surface.toast
    success:      green.base
    error:        red.bright
    warning:      orange.warning
    info:         blue.base
    shadow:       overlay.shadow

  input:
    bg:           surface.input
    text:         text.input
    border:       line.default
    border_focus: blue.bright
    ring_focus:   blue.subtle

  modal:
    bg:           surface.modal
    backdrop:     overlay.backdrop
    border_top:   blue.border
    shadow:       overlay.shadow_deep

  industry:
    manufacturing:  teal.base
    research_te:    baby_blue.bright
    research_me:    purple.bright
    copy:           indigo.base
    invention:      orange.base
    reverse:        red.base

  tier:
    top:        baby_blue.base
    t2:         indigo.base
    t1:         orange.base
    t0:         teal.base
    tech2_dot:  yellow.base
    faction_dot: green.dim
    perfect_dot: indigo.base

  security:
    hisec:    blue.hisec
    lowsec:   yellow.lowsec
    nullsec:  red.base
    wormhole: indigo.dim
    newbie:   teal.base

  breadcrumb:
    hisec_text:     blue.hisec
    hisec_bg:       blue.subtle
    lowsec_text:    yellow.lowsec
    lowsec_bg:      yellow.subtle
    nullsec_bg:     red.border_dim
    newbie_bg:      teal.subtle
    lawless_text:   red.dim
    lawless_bg:     "rgba(60,10,10,0.12)"
    lawless_border: "#c0392b"

  wallet:
    bounty:     red.bright
    trade:      teal.base
    transfers:  yellow.base
    misc:       text.header

  portrait:
    border:     blue.base
    glow:       blue.glow

  update:
    bg:         green.update_bg
    border:     "#16a34a"
    text:       green.update
    btn_border: green.base
    btn_text:   green.base
    skip_color: text.dim

  esi_badge:
    border:     green.glow
    bg:         green.subtle

  gas:
    cytoserocin:  orange.base
    mykoserocin:  teal.base
    fullerite:    purple.bright
    pochven:      pink.base
