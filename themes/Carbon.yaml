# ─────────────────────────────────────────────────────────────────────────────
# EVE Carbon — "Carbon" theme
#
# 16 named colour slots, each with states.
# Changing any base value here cascades through every semantic mapping below,
# which in turn drives every CSS variable in the app.
#
# Slots
#   1  red        Primary accent / danger / null-sec
#   2  teal       Positive values / manufacturing / online / hi-sec
#   3  purple     ME research / blueprints / tier-2 rank
#   4  pink       Pochven / null-sec (secondary) / female char indicator
#   5  baby_blue  Info labels / male char indicator / TE research
#   6  green      Success / online status / wealth bar (good)
#   7  yellow     Warning / low-sec / tech-2 tier
#   8  orange     Invention / low-sec (alt) / wallet transfers
#   9  gold       Highlights / boss badge / system selection
#  10  indigo     Copy / tier-2 (bright) / reverse engineering
#  11  cyan       Hi-sec (deep) / live ESI badge
#  12  blue       Navigation active / links / scrollbar
#  13  surface    All background layers (body → card → input)
#  14  text       All text weights (primary → muted → on-accent)
#  15  line       Borders, dividers, separators
#  16  overlay    Backdrops, glows, ambient atmosphere
# ─────────────────────────────────────────────────────────────────────────────

name: Carbon
version: "1.0"
author: Ms Moirai
description: "Default dark-space theme for EVE Carbon. Deep blacks with crimson accents and a full EVE-faction-inspired supporting palette."

# Which palette slot fills each semantic CSS role.
# Changing 'accent' here is what makes Carbon red vs Sirius blue.
roles:
  accent:  red
  danger:  red
  success: green
  warning: orange
  info:    blue

# ── 16 colour slots ───────────────────────────────────────────────────────────

palette:

  # 1 ── Red (primary accent / crimson / null-sec / danger)
  red:
    base:       "#c0392b"   # primary accent — buttons, active borders, icons
    bright:     "#e74c3c"   # hover / error toast / danger status
    dim:        "#7b1e14"   # badge background / pressed / disabled tint
    subtle:     "rgba(192,57,43,0.08)"   # focus ring / card glow
    glow:       "rgba(192,57,43,0.22)"   # ambient glow / portrait shadow
    border:     "rgba(192,57,43,0.25)"   # modal top border / selected card edge
    border_dim: "rgba(192,57,43,0.08)"   # panel outer border (very faint)

  # 2 ── Teal (manufacturing / online / positive / hi-sec)
  teal:
    base:       "#4ecbb0"   # manufacturing badge / online / positive ISK / assets
    bright:     "#6de0c9"   # hover / active highlight
    dim:        "#2a7a6e"   # disabled / muted teal
    subtle:     "rgba(78,203,176,0.12)"  # active character panel edge
    glow:       "rgba(0,179,166,0.40)"   # portrait border glow

  # 3 ── Purple (ME research / blueprints / tier-2)
  purple:
    base:       "#9b59b6"   # copy blueprint / assets category
    bright:     "#ab7ab8"   # ME research badge / BPO indicator / tier-2 rank
    dim:        "#6c3483"   # compressed ore label
    subtle:     "rgba(155,89,182,0.12)"  # blueprint card hover
    glow:       "rgba(143,115,216,0.20)" # tier-2 glow

  # 4 ── Pink (Pochven / null-sec alt / female char / Sansha)
  pink:
    base:       "#c05c7e"   # null-sec region label / Pochven gas / Sansha breadcrumb
    bright:     "#d4789a"   # hover state
    dim:        "#7a2b4e"   # disabled / muted
    subtle:     "rgba(192,92,126,0.12)"  # pie chart slice
    glow:       "rgba(192,92,126,0.20)"

  # 5 ── Baby Blue (info / TE research / male char)
  baby_blue:
    base:       "#67ace4"   # male character indicator / info label
    bright:     "#8dc4f0"   # TE research badge / hover
    dim:        "#3a6a9a"   # disabled / muted
    subtle:     "rgba(103,172,228,0.10)"
    glow:       "rgba(103,172,228,0.20)"

  # 6 ── Green (success / online status / wealth bar top)
  green:
    base:       "#4ada8a"   # success toast / online dot / progress bar (>90%)
    bright:     "#3ddc84"   # status-online light
    dim:        "#1f7a3a"   # muted success
    subtle:     "rgba(74,218,138,0.10)"  # ESI badge background
    glow:       "rgba(74,218,138,0.25)"  # ESI badge border
    update:     "#6fcf6f"   # update banner text (slightly warmer)
    update_bg:  "rgba(30,58,30,0.95)"   # update banner background

  # 7 ── Yellow (warning / low-sec / tech-2 dots)
  yellow:
    base:       "#e6c84a"   # warning toast / assets transfers / pie slice
    bright:     "#f0d870"   # hover
    dim:        "#9a8220"   # disabled / muted
    subtle:     "rgba(230,200,74,0.10)"
    glow:       "rgba(230,200,74,0.20)"
    lowsec:     "#d4a017"   # low-sec system label (slightly more amber)

  # 8 ── Orange (invention / wallet transfers / low-sec alt)
  orange:
    base:       "#e3a84d"   # invention badge / lowsec region / cytoserocin gas
    bright:     "#f0bf72"   # hover
    dim:        "#9a6822"   # disabled
    subtle:     "rgba(227,168,77,0.10)"
    glow:       "rgba(227,168,77,0.20)"
    warning:    "#e67e22"   # system warning toast / downloading SDE

  # 9 ── Gold (boss badge / system highlight / implant hover)
  gold:
    base:       "#ffd700"   # boss badge / selected system stroke
    bright:     "#ffe44d"   # hover
    dim:        "#b39700"   # muted gold / lowsec (deep)
    subtle:     "rgba(255,215,0,0.10)"
    glow:       "rgba(255,215,0,0.25)"

  # 10 ── Indigo (reverse engineering / tier-2 bright / copy variant)
  indigo:
    base:       "#8f73d8"   # tier-2 rank dot / perfect blueprint indicator
    bright:     "#a890e8"   # hover
    dim:        "#5a4190"   # disabled
    subtle:     "rgba(143,115,216,0.10)"
    glow:       "rgba(143,115,216,0.20)"

  # 11 ── Cyan (deep hi-sec / live ESI / map gradient end)
  cyan:
    base:       "#2effff"   # map hi-sec end / live data indicator
    bright:     "#80ffff"   # hover
    dim:        "#009999"   # muted
    subtle:     "rgba(46,255,255,0.08)"
    glow:       "rgba(46,255,255,0.15)"

  # 12 ── Blue (navigation / scrollbar / links / Caldari)
  blue:
    base:       "#4a9fd4"   # TE research badge / active nav bg source
    bright:     "#0084ff"   # scrollbar / SDE ok state / link hover
    dim:        "#2c6a8f"   # disabled
    nav_active: "rgba(0,122,204,0.12)"  # nav button active background
    subtle:     "rgba(74,159,212,0.10)"
    glow:       "rgba(74,159,212,0.20)"
    hisec:      "#3d85c8"   # hi-sec system label / Caldari

  # 13 ── Surface (all background layers)
  surface:
    body:       "#060606"   # html/body root
    deep:       "rgba(5,5,5,0.85)"      # titlebar / nav buttons / inputs
    panel:      "rgba(13,13,13,0.85)"   # sidebar / settings menu
    card:       "rgba(33,33,33,0.85)"   # settings blocks / KPI cards
    card_deep:  "rgba(12,12,12,0.85)"   # blueprint card / selected card / .panel
    input:      "rgba(10,10,10,0.85)"   # text / select / textarea
    modal:      "rgba(14,14,14,0.85)"   # modal dialog
    toast:      "rgba(12,12,12,0.85)"   # toast notification
    code:       "#080808"               # inline code
    hover:      "rgba(51,51,51,0.356)"  # nav button hover
    hover_subtle: "rgba(255,255,255,0.03)" # very subtle row hover
    banner_end: "rgba(17,4,4,0.85)"     # dashboard banner gradient end
    map:        "#050810"               # map canvas background

  # 14 ── Text (all weight levels)
  text:
    primary:    "#c8c8c8"   # body copy / toast / settings labels
    secondary:  "#d4d4d4"   # titlebar / nav labels
    tertiary:   "#bdbdbd"   # subtitle / console toggle / log-time
    header:     "#7c7c7c"   # panel-header label
    muted:      "#8a8a8a"   # empty-state title
    dim:        "#696969"   # empty-state sub / console label
    faint:      "#535353"   # console timestamp
    console:    "#666666"   # console default message
    input:      "#c2c2c2"   # field input / select value
    on_accent:  "#000000"   # text on solid accent background
    name:       "#d8d8d8"   # character welcome name

  # 15 ── Line (borders, dividers, rules)
  line:
    default:    "rgba(248,0,0,0.17)"    # primary border (faint red tint)
    panel:      "rgba(194,60,60,0.36)"  # app-console top / sidebar scrollbar
    outer:      "rgba(255,0,0,0.19)"    # .panel outer border
    divider:    "#1a1a1a"               # .panel header divider / code block
    subtle:     "rgba(255,255,255,0.04)" # chart grid / very faint rule

  # 16 ── Overlay (backdrops, atmosphere, ambient glows)
  overlay:
    backdrop:   "rgba(167,29,132,0.82)" # modal backdrop (purple-magenta tint)
    shadow:     "rgba(0,0,0,0.35)"      # toast / card drop-shadow
    shadow_deep: "rgba(0,0,0,0.80)"     # modal drop-shadow
    shadow_md:  "rgba(0,0,0,0.60)"      # portrait shadow
    hatch:      "rgba(255,255,255,0.018)" # body diagonal-hatch stripe
    hatch_card: "rgba(255,255,255,0.010)" # card hatch stripe
    # Ambient body glows (two radial gradients behind everything)
    glow_a1:    "rgba(15,67,180,0.61)"
    glow_a2:    "rgba(140,15,8,0.47)"
    glow_a3:    "rgba(100,8,4,0.08)"
    glow_b1:    "rgba(59,158,175,0.10)"
    glow_b2:    "rgba(43,54,207,0.16)"
    # Concord ambient glows (the two .concord-bg-glow divs)
    concord_1:  "rgba(0,43,235,0.61)"
    concord_2:  "rgba(32,16,122,0.53)"
    concord_3:  "rgba(3,16,90,0.09)"
    concord_4:  "rgba(4,26,100,0.10)"
    concord_5:  "rgba(41,68,126,0.33)"


# ── Semantic component mappings ───────────────────────────────────────────────
# These map the 16 palette slots to specific UI roles.
# Change a slot above and every mapped component updates.

ui:

  # Buttons
  button:
    bg:           red.base
    bg_hover:     red.bright
    bg_pressed:   red.dim
    bg_disabled:  surface.hover
    text:         text.secondary
    text_disabled: text.dim
    border:       red.base
    border_focus: red.bright

  # Navigation sidebar
  nav:
    bg_active:    blue.nav_active
    text_active:  text.secondary
    indicator:    teal.base
    icon_active:  red.base

  # Status indicators (dots, badges)
  status:
    online:       green.bright
    offline:      red.bright
    warning:      yellow.base
    info:         blue.base
    connecting:   yellow.base

  # Toasts / notifications
  toast:
    bg:           surface.toast
    success:      green.base
    error:        red.bright
    warning:      orange.warning
    info:         blue.base
    shadow:       overlay.shadow

  # Input fields
  input:
    bg:           surface.input
    text:         text.input
    border:       line.default
    border_focus: red.bright
    ring_focus:   red.subtle

  # Modals / dialogs
  modal:
    bg:           surface.modal
    backdrop:     overlay.backdrop
    border_top:   red.border
    shadow:       overlay.shadow_deep

  # Industry job badges
  industry:
    manufacturing:  teal.base
    research_te:    baby_blue.bright
    research_me:    purple.bright
    copy:           indigo.base
    invention:      orange.base
    reverse:        red.base

  # Blueprint tier / rank dots
  tier:
    top:    blue.base       # top-tier
    t2:     indigo.base     # tier-2
    t1:     orange.base     # tier-1
    t0:     teal.base       # tier-0
    tech2_dot:  yellow.base
    faction_dot: green.dim
    perfect_dot: indigo.base

  # EVE security status labels
  security:
    hisec:    blue.hisec
    lowsec:   yellow.lowsec
    nullsec:  red.base
    wormhole: indigo.dim
    newbie:   teal.base

  # Security breadcrumbs (dashboard)
  breadcrumb:
    hisec_text: blue.hisec
    hisec_bg:   blue.subtle
    lowsec_text: yellow.lowsec
    lowsec_bg:  yellow.subtle
    nullsec_bg: red.border_dim
    newbie_bg:  teal.subtle
    lawless_text: red.dim
    lawless_bg:   "rgba(60,10,10,0.55)"
    lawless_border: "#5a1a1a"

  # Wallet / asset category colours
  wallet:
    bounty:     red.bright
    trade:      teal.base
    transfers:  yellow.base
    misc:       text.header

  # Map security gradient (null → hi-sec, 16 steps)
  # Listed low-to-high; interpolate between these anchors
  map_security:
    wspace:     surface.card_deep
    deep_null:  "#c00000"
    null_0:     red.bright
    low_1:      "#d73000"
    low_2:      "#f04800"
    low_3:      "#f06000"
    low_4:      "#d77700"
    boundary:   yellow.base
    hi_1:       "#8fef2f"
    hi_2:       green.base
    hi_3:       "#00ef47"
    hi_4:       teal.base
    hi_5:       cyan.base

  # EVE faction colours (map sovereignty)
  faction:
    caldari:    blue.hisec
    minmatar:   orange.base
    amarr:      gold.base
    gallente:   green.dim
    jove:       indigo.base
    concord:    text.header
    ammatar:    blue.dim
    khanid:     gold.dim
    thukker:    orange.dim
    sansha:     pink.base
    blood:      red.dim

  # Character portrait / active-char panel
  portrait:
    border:     teal.base
    glow:       teal.glow

  # Update banner
  update:
    bg:         green.update_bg
    border:     "#2e6b2e"
    text:       green.update
    btn_border: green.base
    btn_text:   green.base
    skip_color: text.dim

  # ESI live badge (top-right)
  esi_badge:
    border:     green.glow
    bg:         green.subtle

  # Gas cloud colours (booster mining)
  gas:
    cytoserocin:  orange.base
    mykoserocin:  teal.base
    fullerite:    purple.bright
    pochven:      pink.base
