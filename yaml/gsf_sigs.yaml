# ─── Comms Channels ────────────────────────────────────────────────────────────
# Map broadcast comms field values to their voice/link URLs.
# The JOIN button in ping alerts uses these when no URL is embedded in the ping.
# The Jabber comms column also turns matching entries into clickable links.
#
# HOW TO USE:
#   Fill in 'url' with your Mumble server link, Discord invite, etc.
#   'match' values are checked against the comms text (case-insensitive).
#   Add your own entries at the bottom for SIG-specific channels.

comms_channels:
  - name: "Op 1"
    match: ["op 1", "op1"]
    url: "mumble://mumble.goonfleet.com/Ops/Op%20Channels/OP%201%20-%20Back%20to%20Back%20X47%20Champions?title=Goonfleet&version=1.2.0"

  - name: "Op 2"
