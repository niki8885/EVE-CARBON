<!-- ── Jabber Page ────────────────────────────────────────────────────────── -->
<style>
  /* ── View button ── */
  .ping-view-btn {
    padding: 2px 10px;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--accent-dim);
    border: 1px solid var(--accent-25);
    border-radius: var(--radius, 2px);
    color: var(--accent);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .ping-view-btn:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .ping-view-btn--live,
  .ping-view-btn:disabled {
    background: none;
    border-color: var(--border);
    color: var(--text-3);
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* ── Columns toggle button ── */
  .jabber-cols-btn {
    padding: 2px 8px;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius, 2px);
    color: var(--text-3);
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .jabber-cols-btn:hover,
  .jabber-cols-btn.active {
    color: var(--accent);
    border-color: var(--accent);
  }

  /* ── PAP type badges ── */
  .jpap-badge {
    display: inline-block;
    font-size: 9px;
    font-family: var(--mono);
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 1px 5px;
    border-radius: var(--radius);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .jpap-stratop   { background: rgba(192,57,43,0.15);  color: #e05a4a; border: 1px solid rgba(192,57,43,0.35); }
  .jpap-peacetime { background: rgba(52,120,210,0.12); color: #6aabf7; border: 1px solid rgba(52,120,210,0.30); }
  .jpap-sig       { background: rgba(39,174,96,0.10);  color: #4ada8a; border: 1px solid rgba(39,174,96,0.28); }

  /* ── Resize handles ── */
  /* No overflow:hidden on th — that clips the handle */
  #jabberTable thead th {
    position: relative;
  }
  /* Text inside th clips so the handle has room */
  #jabberTable thead th .th-text {
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-right: 8px;
  }
  /* Handle straddles the column border — right:-4px lets it overlap the next col */
  .col-resize-handle {
    position: absolute;
    right: -4px;
    top: 0;
    height: 100%;
    width: 9px;
    cursor: col-resize;
    user-select: none;
    z-index: 10;
  }
  .col-resize-handle::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 20%;
    height: 60%;
    width: 1px;
    background: var(--border);
    transition: background 0.12s;
  }
  .col-resize-handle:hover::after,
  .col-resize-handle.dragging::after {
    background: var(--accent-40);
  }

  /* ── Table cell overflow ── */
  #jabberTable td {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 0;
  }

  /* ── Dynamic column visibility — rules injected by JS ── */
</style>
<style id="jabberColVisStyle"></style>

<div id="page-jabber" class="nav-page"
     style="flex-direction:column; height:100%;">
  <div class="page-header">
    <h2>Jabber</h2>
    <button class="close-page-btn" onclick="closePage('jabber')">✕</button>
  </div>

  <div class="page-content" style="display:flex; flex-direction:column; gap:18px;">

    <!-- Status row -->
    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <span id="jabberStatus" class="asset-summary">Connecting to Jabber...</span>
    </div>

    <!-- Summary + columns toggle row -->
    <div class="ping-filter-row" style="display:flex; align-items:center; gap:10px;">
      <span id="jabberSummary" class="asset-summary">No messages received yet.</span>
      <div style="position:relative; margin-left:auto;">
        <button id="jabberColsBtn" class="jabber-cols-btn">Columns ▾</button>
        <div id="jabberColsDropdown"
             style="display:none; position:absolute; top:calc(100% + 4px); right:0; z-index:200;
                    background:var(--bg-card); border:1px solid var(--border);
                    border-radius:var(--radius); padding:8px 10px; min-width:130px;
                    box-shadow:0 4px 16px rgba(0,0,0,0.5);">
        </div>
      </div>
    </div>

    <!-- Messages table -->
    <div class="asset-table-wrapper" style="padding:0; overflow-x:auto;">
      <table id="jabberTable" class="asset-table ping-table"
             style="table-layout:fixed; width:100%; min-width:600px;">
        <colgroup>
          <col id="jcol-0" style="width:160px"><!-- EVE Time -->
          <col id="jcol-1" style="width:100px"><!-- FC Name -->
          <col id="jcol-2" style="width:120px"><!-- Formup -->
          <col id="jcol-3" style="width:90px"> <!-- PAP Type -->
          <col id="jcol-4" style="width:110px"><!-- Doctrine -->
          <col id="jcol-5" style="width:60px"> <!-- SIG -->
          <col id="jcol-6" style="width:110px"><!-- Comms -->
          <col id="jcol-7" style="width:90px"> <!-- Pinged By -->
          <col id="jcol-8" style="width:70px"> <!-- Target -->
          <col id="jcol-9" style="width:280px"><!-- Message -->
          <col id="jcol-10" style="width:62px"><!-- View -->
        </colgroup>
        <thead>
          <tr>
            <th><span class="th-text">EVE Time</span></th>
            <th><span class="th-text">FC Name</span></th>
            <th><span class="th-text">Formup</span></th>
            <th><span class="th-text">PAP Type</span></th>
            <th><span class="th-text">Doctrine</span></th>
            <th><span class="th-text">SIG</span></th>
            <th><span class="th-text">Comms</span></th>
            <th><span class="th-text">Pinged By</span></th>
            <th><span class="th-text">Target</span></th>
            <th><span class="th-text">Message</span></th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="11" class="loading-row">
              Auto-connecting to Jabber; saved settings are used from the settings menu.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
