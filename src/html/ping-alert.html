<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Director Ping</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── Carbon defaults — overridden at runtime by initTheme() ── */
    :root {
      /* Core surfaces */
      --bg-body:      #060606;
      --bg:           #060606;
      --bg-panel:     rgba(13, 13, 13, 0.80);
      --bg-deep:      rgba(5, 5, 5, 0.80);
      --bg-card:      rgba(20, 20, 20, 0.80);

      /* Borders */
      --border:       rgba(248, 0, 0, 0.17);
      --border-e:     #1a1a1a;

      /* Accent + alpha steps */
      --accent:       #c0392b;
      --accent-dim:   rgba(192, 57, 43, 0.12);
      --accent-04:    rgba(192, 57, 43, 0.04);
      --accent-06:    rgba(192, 57, 43, 0.06);
      --accent-08:    rgba(192, 57, 43, 0.08);
      --accent-10:    rgba(192, 57, 43, 0.10);
      --accent-12:    rgba(192, 57, 43, 0.12);
      --accent-25:    rgba(192, 57, 43, 0.25);
      --accent-30:    rgba(192, 57, 43, 0.30);
      --accent-40:    rgba(192, 57, 43, 0.40);

      /* Text */
      --text-1:       #c8c8c8;
      --text-2:       #d4d4d4;
      --text-3:       #bdbdbd;
      --text-4:       #7c7c7c;

      /* Status */
      --warning:      #e67e22;
      --danger:       #e74c3c;
      --success:      #27ae60;

      /* EVE palette colours used in this window */
      --teal:         #00b3a6;
      --teal-bg:      rgba(0, 150, 136, 0.12);
      --teal-border:  rgba(0, 150, 136, 0.35);
      --teal-text:    #4dd0c4;
      --indigo-bg:    rgba(148, 103, 210, 0.12);
      --indigo-border:rgba(148, 103, 210, 0.32);
      --indigo-text:  #c39ff5;

      /* Atmospheric glows — body pseudo-elements */
      --glow-body-a1: rgba(15,  67, 180, 0.61);
      --glow-body-a2: rgba(140, 15,   8, 0.47);
      --glow-body-a3: rgba(100,  8,   4, 0.08);
      --glow-body-b1: rgba(59, 158, 175, 0.10);
      --glow-body-b2: rgba(43,  54, 207, 0.16);

      /* Concord ambient glow divs */
      --glow-main-1:  rgba(0,  43, 235, 0.61);
      --glow-main-2:  rgba(32, 16, 122, 0.53);
      --glow-main-3:  rgba(3,  16,  90, 0.09);
      --glow-sec-1:   rgba(4,  26, 100, 0.10);
      --glow-sec-2:   rgba(41, 68, 126, 0.33);

      /* Hatch */
      --hatch-color:  rgba(255, 255, 255, 0.018);

      /* Typography */
      --mono:   'Fira Code', monospace;
      --font:   'Fira Sans', sans-serif;
      --radius: 2px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 640px;
      height: 440px;
      overflow: hidden;
      background: var(--bg-body);
      font-family: var(--font);
      color: var(--text-1);
      user-select: none;
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Crosshatch background */
    html, body {
      background-image:
        repeating-linear-gradient(
          -45deg,
          var(--hatch-color) 0px, var(--hatch-color) 1px,
          transparent 1px, transparent 4px
        ),
        repeating-linear-gradient(
          45deg,
          var(--hatch-color) 0px, var(--hatch-color) 0.5px,
          transparent 0.5px, transparent 4px
        );
      background-size: 4px 4px;
    }

    /* Upper-left radial glow */
    body::before {
      content: '';
      position: fixed;
      top: -15px; left: -15px;
      width: 520px; height: 520px;
      background: radial-gradient(
        ellipse at center,
        var(--glow-body-a1)  0%,
        var(--glow-body-a2) 30%,
        var(--glow-body-a3) 55%,
        transparent 75%
      );
      pointer-events: none;
      z-index: 0;
      border-radius: 50%;
    }

    /* Bottom-right secondary glow */
    body::after {
      content: '';
      position: fixed;
      bottom: -160px; right: -160px;
      width: 640px; height: 640px;
      background: radial-gradient(
        ellipse at center,
        var(--glow-body-b1)  0%,
        var(--glow-body-b2) 40%,
        transparent 70%
      );
      pointer-events: none;
      z-index: 0;
      border-radius: 50%;
    }

    /* Concord ambient glow divs */
    .concord-bg-glow {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      border-radius: 50%;
      mix-blend-mode: screen;
    }
    .concord-glow-main {
      top: -220px; left: -220px;
      width: 900px; height: 900px;
      background: radial-gradient(
        ellipse at 35% 35%,
        var(--glow-main-1)  0%,
        var(--glow-main-2) 28%,
        var(--glow-main-3) 52%,
        transparent 70%
      );
      animation: concordGlowPulse 8s ease-in-out infinite;
    }
    .concord-glow-secondary {
      top: 35%; left: -80px;
      width: 380px; height: 380px;
      background: radial-gradient(
        ellipse at center,
        var(--glow-sec-1)  0%,
        var(--glow-sec-2) 45%,
        transparent 70%
      );
      animation: concordGlowPulse 12s ease-in-out infinite reverse;
    }
    @keyframes concordGlowPulse {
      0%, 100% { opacity: 0.85; transform: scale(1); }
      50%      { opacity: 1.0;  transform: scale(1.06); }
    }

    /* Corner accents */
    .corner { position: absolute; width: 16px; height: 16px; z-index: 10; }
    .corner-tl { top:  6px; left:  6px; border-top:  1px solid var(--accent); border-left:  1px solid var(--accent); }
    .corner-tr { top:  6px; right: 6px; border-top:  1px solid var(--accent); border-right: 1px solid var(--accent); }
    .corner-bl { bottom: 6px; left:  6px; border-bottom: 1px solid var(--accent); border-left:  1px solid var(--accent); }
    .corner-br { bottom: 6px; right: 6px; border-bottom: 1px solid var(--accent); border-right: 1px solid var(--accent); }

    /* Outer border glow */
    .shell {
      position: absolute; inset: 0;
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow:
        inset 0 0 40px var(--accent-04),
        0 0 0 1px var(--accent-10),
        0 0 30px var(--accent-12),
        0 0 60px var(--accent-06);
      z-index: 100;
      pointer-events: none;
    }

    /* Main layout */
    .window {
      position: relative;
      width: 576px; height: 376px;
      display: flex;
      flex-direction: column;
      z-index: 2;
      border-radius: 4px;
      overflow: hidden;
      animation: slide-in 0.22s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes slide-in {
      from { opacity: 0; transform: scale(0.95) translateY(-8px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);     }
    }
    @media (prefers-reduced-motion: reduce) {
      .window { animation: none; opacity: 1; transform: none; }
    }

    /* Title bar */
    .titlebar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px 9px 18px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, var(--accent-10) 0%, var(--bg-deep) 60%);
      flex-shrink: 0;
      -webkit-app-region: drag;
    }

    .alert-badge {
      display: flex; align-items: center; gap: 7px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--warning);
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .alert-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--warning);
      box-shadow: 0 0 7px var(--warning);
      animation: pulse-dot 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1;    transform: scale(1);    }
      50%       { opacity: 0.35; transform: scale(0.65); }
    }

    .titlebar-sig {
      flex: 1;
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--text-2);
      text-transform: uppercase;
      font-family: var(--mono);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .close-btn {
      -webkit-app-region: no-drag;
      width: 26px; height: 26px;
      border: 1px solid var(--border-e);
      border-radius: var(--radius);
      background: var(--accent-08);
      color: var(--text-4);
      font-size: 13px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .close-btn:hover {
      background: var(--accent-30);
      border-color: var(--accent);
      color: var(--text-2);
    }

    /* From banner */
    .from-banner {
      padding: 9px 18px;
      border-bottom: 1px solid var(--border-e);
      display: flex;
      align-items: baseline;
      gap: 10px;
      background: var(--accent-06);
      flex-shrink: 0;
    }
    .from-label {
      font-family: var(--mono); font-size: 9px;
      letter-spacing: 0.15em; color: var(--text-4);
      text-transform: uppercase; flex-shrink: 0;
    }
    .from-name { font-size: 16px; font-weight: 700; letter-spacing: 0.04em; color: var(--accent); }
    .from-time { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--text-4); white-space: nowrap; }

    /* Fields grid — 3 columns */
    .fields-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 1px; background: var(--border-e);
      border-bottom: 1px solid var(--border-e); flex-shrink: 0;
    }
    .field { background: var(--bg-panel); padding: 8px 14px; display: flex; flex-direction: column; gap: 3px; }
    .field-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; color: var(--text-4); text-transform: uppercase; }
    .field-value { font-size: 13px; font-weight: 600; letter-spacing: 0.02em; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .field-value.highlight { color: var(--warning); }
    .field-value.muted     { color: var(--text-4); }

    /* Second row — 2 cols */
    .fields-grid-2 {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1px; background: var(--border-e);
      border-bottom: 1px solid var(--border-e); flex-shrink: 0;
    }

    /* Message block */
    .hurf-block {
      flex: 1;
      padding: 10px 18px;
      overflow-y: auto;
      background: var(--bg-deep);
    }
    .hurf-block::-webkit-scrollbar       { width: 3px; }
    .hurf-block::-webkit-scrollbar-thumb { background: var(--border-e); border-radius: 2px; }
    .hurf-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; color: var(--text-4); text-transform: uppercase; margin-bottom: 5px; }
    .hurf-text  { font-size: 12px; line-height: 1.6; color: var(--text-3); word-break: break-word; font-family: var(--mono); }

    /* Footer */
    .footer {
      padding: 7px 18px;
      border-top: 1px solid var(--border-e);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-panel);
      flex-shrink: 0;
    }
    .footer-meta { font-family: var(--mono); font-size: 10px; color: var(--text-4); letter-spacing: 0.07em; }
    .footer-meta .accent { color: var(--accent); }

    /* Countdown ring */
    .countdown-ring { position: relative; width: 26px; height: 26px; flex-shrink: 0; }
    .countdown-ring svg { transform: rotate(-90deg); }
    .countdown-ring .track { fill: none; stroke: var(--border-e); stroke-width: 2.5; }
    .countdown-ring .fill  { fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round; stroke-dasharray: 69.1; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }
    .countdown-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 8px; color: var(--text-4); }

    /* Dismiss button */
    .dismiss-btn {
      -webkit-app-region: no-drag;
      padding: 5px 16px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-30);
      border-radius: var(--radius);
      color: var(--accent);
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      letter-spacing: 0.10em; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s;
    }
    .dismiss-btn:hover {
      background: var(--accent-25);
      border-color: var(--accent);
      color: var(--text-2);
      box-shadow: 0 0 10px var(--accent-25);
    }

    /* Formup nav button — uses indigo slot */
    .formup-nav-btn {
      display: inline-block;
      font-size: 12px; font-weight: 600;
      font-family: var(--font); letter-spacing: 0.02em;
      padding: 2px 8px;
      border-radius: var(--radius);
      background: var(--indigo-bg);
      color: var(--indigo-text);
      border: 1px solid var(--indigo-border);
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      -webkit-app-region: no-drag;
    }
    .formup-nav-btn:hover:not(:disabled) {
      background: var(--indigo-bg-hover, rgba(148,103,210,0.25));
      border-color: var(--indigo-border-hover, rgba(148,103,210,0.55));
      color: var(--indigo-text-bright, #d8beff);
    }
    .formup-nav-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .formup-nav-btn.done { color: var(--success); border-color: rgba(39,174,96,0.40); background: rgba(39,174,96,0.10); }
    .formup-nav-btn.err  { color: var(--danger);  border-color: var(--accent-40); background: var(--accent-10); }

    /* FC portrait */
    .fc-portrait {
      width: 33px; height: 33px;
      border-radius: 50%;
      border: 1px solid var(--accent-40);
      object-fit: cover; flex-shrink: 0;
      display: none;
      background: var(--bg-card);
    }
    .fc-portrait.loaded { display: block; }
    #fcNameRow { display: flex; align-items: center; gap: 8px; }

    /* Join button — uses teal slot */
    .join-btn {
      -webkit-app-region: no-drag;
      padding: 5px 16px;
      background: var(--teal-bg);
      border: 1px solid var(--teal-border);
      border-radius: var(--radius);
      color: var(--teal-text);
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      letter-spacing: 0.10em; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s; min-width: 60px;
    }
    .join-btn:hover:not(:disabled) {
      background: var(--teal-bg-hover, rgba(0,150,136,0.25));
      border-color: var(--teal-text);
      color: var(--text-2);
      box-shadow: 0 0 10px var(--teal-bg, rgba(0,150,136,0.20));
    }
    .join-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .join-btn.ok   { color: var(--teal-text); border-color: var(--teal-border-strong, rgba(0,150,136,0.55)); }
    .join-btn.fail { color: var(--warning); border-color: var(--warning); }

    /* PAP type badges — semantic colours, theme-independent */
    .pap-badge {
      display: inline-block; font-size: 10px;
      font-family: var(--mono); font-weight: 700;
      letter-spacing: 0.08em; padding: 1px 7px;
      border-radius: var(--radius); text-transform: uppercase;
    }
    .pap-stratop  { background: var(--accent-15, rgba(192,57,43,0.15));  color: var(--danger);  border: 1px solid var(--accent-30); }
    .pap-peacetime{ background: rgba(52,120,210,0.12); color: #6aabf7;  border: 1px solid rgba(52,120,210,0.30); }
    .pap-sig      { background: rgba(39,174,96,0.10);  color: var(--success); border: 1px solid rgba(39,174,96,0.28); }
    .pap-none     { background: var(--accent-04);      color: var(--text-4);  border: 1px solid var(--border-e); }
  </style>
</head>
<body>
  <div class="concord-bg-glow concord-glow-main"></div>
  <div class="concord-bg-glow concord-glow-secondary"></div>

  <div class="window">
    <div class="shell"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="titlebar">
      <div class="alert-badge">
        <div class="alert-dot"></div>
        Director Ping
      </div>
      <div class="titlebar-sig" id="sigLabel">Broadcast</div>
      <button class="close-btn" id="closeBtn" title="Dismiss">✕</button>
    </div>

    <div class="from-banner">
      <span class="from-label">From</span>
      <span class="from-name" id="fromName">—</span>
      <span class="from-time" id="eveTime">—</span>
    </div>

    <div class="fields-grid">
      <div class="field">
        <span class="field-label">FC Name</span>
        <span class="field-value highlight" id="fcNameRow">
          <img id="fcPortrait" class="fc-portrait" alt="">
          <span id="fcName">—</span>
        </span>
      </div>
      <div class="field">
        <span class="field-label">Formup Location</span>
        <span class="field-value" style="overflow:visible;">
          <button class="formup-nav-btn" id="formupBtn" disabled title="Set autopilot destination">—</button>
        </span>
      </div>
      <div class="field">
        <span class="field-label">Comms</span>
        <span class="field-value highlight" id="commsVal">—</span>
      </div>
    </div>

    <div class="fields-grid-2">
      <div class="field">
        <span class="field-label">PAP Type</span>
        <span class="field-value" id="papType">—</span>
      </div>
      <div class="field">
        <span class="field-label">Doctrine</span>
        <span class="field-value" id="doctrine">—</span>
      </div>
    </div>

    <div class="hurf-block">
      <div class="hurf-label">Message</div>
      <div class="hurf-text" id="hurfText">—</div>
    </div>

    <div class="footer">
      <div class="footer-meta">
        Target: <span class="accent" id="targetSig">—</span>
        &nbsp;·&nbsp;
        Sig: <span class="accent" id="sigName">—</span>
        <span id="footerMsg" style="display:none; margin-left:10px; font-family:var(--mono); font-size:9px;"></span>
      </div>
      <div style="display:flex; align-items:center; gap:10px; -webkit-app-region: no-drag;">
        <div class="countdown-ring" title="Auto-dismiss">
          <svg width="26" height="26" viewBox="0 0 26 26">
            <circle class="track" cx="13" cy="13" r="11"/>
            <circle class="fill"  cx="13" cy="13" r="11" id="countdownArc"/>
          </svg>
          <div class="countdown-num" id="countdownNum">30</div>
        </div>
        <button class="join-btn"    id="joinBtn"    title="Open comms · Set waypoint · Find FC">Join</button>
        <button class="dismiss-btn" id="dismissBtn">Dismiss</button>
      </div>
    </div>
  </div>

  <script>
    const DISMISS_SECS  = 30;
    const CIRCUMFERENCE = 2 * Math.PI * 11;

    // ── Theme init — reads active theme via IPC and overrides CSS vars ─────────
    function hexToRgba(hex, alpha) {
      if (!hex || !hex.startsWith('#')) return null;
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    async function initTheme() {
      try {
        const id = await window.eveAPI.themeGetActive();
        if (!id || id === 'Carbon') return;
        const theme = await window.eveAPI.themeGet(id);
        if (!theme?.palette) return;

        const p = theme.palette;
        const a = p[theme.roles?.accent || 'red'];

        const overrides = {
          '--bg-body':       p.surface?.body,
          '--bg':            p.surface?.body,
          '--bg-panel':      p.surface?.panel,
          '--bg-deep':       p.surface?.deep,
          '--bg-card':       p.surface?.card,
          '--border':        p.line?.default,
          '--border-e':      p.line?.divider,
          '--accent':        a?.base,
          '--accent-dim':    a?.dim,
          '--accent-04':     hexToRgba(a?.base, 0.04),
          '--accent-06':     hexToRgba(a?.base, 0.06),
          '--accent-08':     hexToRgba(a?.base, 0.08),
          '--accent-10':     hexToRgba(a?.base, 0.10),
          '--accent-12':     hexToRgba(a?.base, 0.12),
          '--accent-25':     hexToRgba(a?.base, 0.25),
          '--accent-30':     hexToRgba(a?.base, 0.30),
          '--accent-40':     hexToRgba(a?.base, 0.40),
          '--text-1':        p.text?.primary,
          '--text-2':        p.text?.secondary,
          '--text-3':        p.text?.tertiary,
          '--text-4':        p.text?.header,
          '--warning':       p.orange?.warning || p.orange?.base,
          '--danger':        p.red?.bright,
          '--success':       p.green?.base,
          '--teal':          p.teal?.base,
          '--teal-bg':       hexToRgba(p.teal?.base, 0.12),
          '--teal-border':   hexToRgba(p.teal?.base, 0.35),
          '--teal-text':     p.teal?.bright || p.teal?.base,
          '--indigo-bg':     hexToRgba(p.indigo?.base, 0.12),
          '--indigo-border': hexToRgba(p.indigo?.base, 0.32),
          '--indigo-text':   p.indigo?.bright || p.indigo?.base,
          '--glow-body-a1':  p.overlay?.glow_a1,
          '--glow-body-a2':  p.overlay?.glow_a2,
          '--glow-body-a3':  p.overlay?.glow_a3,
          '--glow-body-b1':  p.overlay?.glow_b1,
          '--glow-body-b2':  p.overlay?.glow_b2,
          '--glow-main-1':   p.overlay?.concord_1,
          '--glow-main-2':   p.overlay?.concord_2,
          '--glow-main-3':   p.overlay?.concord_3,
          '--glow-sec-1':    p.overlay?.concord_4,
          '--glow-sec-2':    p.overlay?.concord_5,
          '--hatch-color':   p.overlay?.hatch,
        };

        const root = document.documentElement;
        for (const [k, v] of Object.entries(overrides)) {
          if (v != null) root.style.setProperty(k, v);
        }
      } catch (e) { /* fall back to Carbon defaults silently */ }
    }

    // Run theme init as early as possible
    if (window.eveAPI) initTheme();

    // ── System ID lookup ──────────────────────────────────────────────────────
    async function resolveSystemId(systemName) {
      try {
        if (window.eveAPI?.systemIdByName) {
          const id = await window.eveAPI.systemIdByName(systemName);
          if (id) return id;
        }
      } catch(e) {}
      const res = await fetch(
        'https://esi.evetech.net/v1/universe/ids/?datasource=tranquility',
        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify([systemName]) }
      );
      if (!res.ok) throw new Error(`ESI ${res.status} resolving system`);
      const data = await res.json();
      const sys  = (data.solar_systems || [])[0];
      if (!sys?.id) throw new Error(`System not found: ${systemName}`);
      return sys.id;
    }

    function showFooterError(msg) {
      const el = document.getElementById('footerMsg');
      if (!el) return;
      const isOk = msg.startsWith('⊕');
      el.textContent   = msg;
      el.style.color   = isOk ? 'var(--success)' : 'var(--warning)';
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; el.textContent = ''; }, 5000);
    }

    // ── FC portrait ───────────────────────────────────────────────────────────
    async function resolveFcPortrait(fcName) {
      if (!fcName) return;
      const img = document.getElementById('fcPortrait');
      if (!img) return;
      try {
        const res = await fetch(
          'https://esi.evetech.net/v1/universe/ids/?datasource=tranquility',
          { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify([fcName]) }
        );
        if (!res.ok) return;
        const data = await res.json();
        const char = (data.characters || [])[0];
        if (char?.id) {
          img.onload  = () => img.classList.add('loaded');
          img.onerror = () => {};
          img.src = `https://images.evetech.net/characters/${char.id}/portrait?size=64`;
        }
      } catch (e) {}
    }

    let pingData    = { fc: null, formup: null, comms: null };
    let commsChannels = [];
    (async () => {
      try {
        if (window.eveAPI?.getCommsChannels) commsChannels = await window.eveAPI.getCommsChannels();
      } catch(e) {}
    })();

    function resolveCommsUrl(commsText) {
      if (!commsText) return null;
      const embedded = commsText.match(/https?:\/\/[^\s<>"]+/i);
      if (embedded) return embedded[0].replace(/[.)]+$/, '');
      const lower = commsText.toLowerCase();
      for (const ch of commsChannels) {
        if (ch.url && ch.match.some(m => lower.includes(m.toLowerCase()))) return ch.url;
      }
      return null;
    }

    function esc(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function clean(str) {
      if (!str) return '';
      return str.replace(/[​-‏‪-‮⁠-⁤﻿­�]/g,'').replace(/https?:\/\/\S+/gi,'').trim();
    }
    function truncate(str, max) {
      if (!str) return '—';
      const s = clean(str);
      return s.length > max ? s.slice(0, max - 1) + '…' : (s || '—');
    }

    function parsePingBody(body) {
      if (!body) return {};
      const fields = {};
      const labels = [
        { key: 'fc',       pattern: /FC\s*Name\s*:/i },
        { key: 'formup',   pattern: /Formup\s*Location\s*:/i },
        { key: 'comms',    pattern: /Comms?\s*:/i },
        { key: 'papType',  pattern: /PAP\s*Type\s*:/i },
        { key: 'doctrine', pattern: /Doctrine\s*:/i },
        { key: 'target',   pattern: /Target(?:\s*Sig)?\s*:/i },
        { key: 'sig',      pattern: /Sig\s*:/i },
      ];
      const hits = [];
      for (const { key, pattern } of labels) {
        const m = body.match(new RegExp(pattern.source, 'i'));
        if (m) hits.push({ key, index: m.index, labelLen: m[0].length });
      }
      hits.sort((a, b) => a.index - b.index);
      const sep = body.search(/\s*---\s*/);
      for (let i = 0; i < hits.length; i++) {
        const start = hits[i].index + hits[i].labelLen;
        const end   = i + 1 < hits.length ? hits[i+1].index : (sep > 0 ? sep : body.length);
        fields[hits[i].key] = body.slice(start, end).trim();
      }
      if (sep > 0) fields.hurf = body.slice(sep).replace(/^-+\s*/,'').trim();
      return fields;
    }

    function populate(msg) {
      const rawText = msg.raw_body || msg.body || '';
      let fc       = msg.fc_name         || null;
      let formup   = msg.formup_location  || null;
      let comms    = msg.comms            || null;
      let papType  = msg.pap_type         || null;
      let doctrine = msg.doctrine         || null;
      let hurf     = msg.hurf             || null;
      let target   = msg.target_sig       || null;
      let sig      = msg.sig              || null;
      let from     = msg.gsol_member || msg.who_pinged || (msg.from ? msg.from.split('/').pop() : null) || '—';
      let eveTime  = msg.eve_timecode || msg.ping_timestamp || null;

      if (!fc && !formup && rawText) {
        const parsed = parsePingBody(rawText);
        fc       = fc       || parsed.fc       || null;
        formup   = formup   || parsed.formup   || null;
        comms    = comms    || parsed.comms    || null;
        papType  = papType  || parsed.papType  || null;
        doctrine = doctrine || parsed.doctrine || null;
        hurf     = hurf     || parsed.hurf     || null;
        target   = target   || parsed.target   || null;
        sig      = sig      || parsed.sig      || null;
      }

      pingData = { fc, formup, comms };

      const joinBtn = document.getElementById('joinBtn');
      if (joinBtn) {
        const parts = [];
        if (comms)  parts.push(comms.replace(/https?:\/\/\S+/gi,'').trim() || comms);
        if (formup) parts.push('→ ' + formup.split(/\s+-\s+/)[0].trim());
        joinBtn.title = parts.length ? parts.join(' · ') : 'Open comms · Set waypoint · Find FC';
      }

      document.getElementById('sigLabel').textContent = sig ? sig.toUpperCase() + ' BROADCAST' : 'DIRECTOR BROADCAST';
      document.getElementById('fromName').textContent  = esc(from);
      document.getElementById('eveTime').textContent   = eveTime ? esc(eveTime) + ' EVE' : '';
      document.getElementById('fcName').textContent    = truncate(fc, 28);
      if (fc) resolveFcPortrait(fc.replace(/[​-‏‪-‮⁠-⁤﻿­]/g,'').trim());

      const formupBtn = document.getElementById('formupBtn');
      if (formupBtn) {
        const display = truncate(formup, 28);
        formupBtn.textContent       = display;
        formupBtn.disabled          = !formup;
        formupBtn.dataset.formup    = formup || '';
      }

      document.getElementById('commsVal').textContent  = truncate(comms, 28);

      const papEl    = document.getElementById('papType');
      const papClean = clean(papType || '');
      if (papClean) {
        const cls = /stratop/i.test(papClean)   ? 'pap-stratop'
                  : /peacetime/i.test(papClean) ? 'pap-peacetime'
                  : 'pap-sig';
        papEl.innerHTML = `<span class="pap-badge ${cls}">${esc(papClean)}</span>`;
      } else {
        papEl.innerHTML = '<span class="pap-badge pap-none">No PAP</span>';
      }

      document.getElementById('doctrine').textContent  = truncate(doctrine, 36);
      if (doctrine) document.getElementById('doctrine').title = clean(doctrine);
      document.getElementById('hurfText').textContent  = hurf ? clean(hurf) : (rawText ? clean(rawText) : '—');
      document.getElementById('targetSig').textContent = truncate(target, 20);
      document.getElementById('sigName').textContent   = truncate(sig, 20);
    }

    // ── Countdown ─────────────────────────────────────────────────────────────
    let secsLeft = DISMISS_SECS;
    const arc    = document.getElementById('countdownArc');
    const numEl  = document.getElementById('countdownNum');
    arc.style.strokeDasharray  = CIRCUMFERENCE;
    arc.style.strokeDashoffset = 0;

    function tick() {
      secsLeft--;
      numEl.textContent = secsLeft;
      arc.style.strokeDashoffset = CIRCUMFERENCE * (1 - secsLeft / DISMISS_SECS);
      if (secsLeft <= 0) dismiss();
    }
    const timer = setInterval(tick, 1000);

    function dismiss() { clearInterval(timer); window.close(); }
    document.getElementById('closeBtn').addEventListener('click',   dismiss);
    document.getElementById('dismissBtn').addEventListener('click', dismiss);

    // ── Formup navigate ───────────────────────────────────────────────────────
    document.getElementById('formupBtn').addEventListener('click', async () => {
      const btn      = document.getElementById('formupBtn');
      const formup   = btn.dataset.formup || '';
      if (!formup) return;
      const systemName = formup.replace(/[​-‏﻿]/g,'').trim().split(/\s+-\s+|\s+\(/)[0].trim();
      if (!systemName) return;
      btn.disabled    = true;
      const origText  = btn.textContent;
      btn.textContent = '…';
      btn.className   = 'formup-nav-btn';
      try {
        const accounts = await window.eveAPI.getAccounts().catch(() => []);
        if (!accounts.length) throw new Error('No characters — add one first');
        const charId   = accounts[0].characterId;
        const systemId = await resolveSystemId(systemName);
        await window.eveAPI.setAutopilotDestination(charId, systemId);
        btn.textContent = '✓ ' + origText;
        btn.classList.add('done');
        setTimeout(() => { btn.textContent = origText; btn.className = 'formup-nav-btn'; btn.disabled = false; }, 2500);
      } catch (err) {
        showFooterError('Navigate: ' + err.message);
        btn.textContent = '⚠ ' + origText;
        btn.classList.add('err');
        btn.title = err.message;
        setTimeout(() => { btn.textContent = origText; btn.className = 'formup-nav-btn'; btn.disabled = false; btn.title = 'Set autopilot destination'; }, 3000);
      }
    });

    // ── JOIN button ───────────────────────────────────────────────────────────
    function extractSystemName(formup) {
      if (!formup) return null;
      return formup.replace(/[​-‏﻿]/g,'').trim().split(/\s+-\s+|\s+\(|\s+>/)[0].trim() || null;
    }

    document.getElementById('joinBtn').addEventListener('click', async () => {
      const btn = document.getElementById('joinBtn');
      btn.disabled = true; btn.textContent = '…'; btn.className = 'join-btn';
      const errors = [];

      const commsUrl = resolveCommsUrl(pingData.comms);
      if (commsUrl) {
        try { await window.eveAPI.openExternalUrl(commsUrl); }
        catch (e) { errors.push('Comms: ' + e.message); }
      }

      if (pingData.fc) {
        const fcName = pingData.fc.replace(/[​-‏‪-‮⁠-⁤﻿­]/g,'').trim();
        try {
          const accounts = await window.eveAPI.getAccounts().catch(() => []);
          const charId   = accounts[0]?.characterId;
          if (!charId) throw new Error('No character logged in');
          const esiRes = await fetch(
            'https://esi.evetech.net/v1/universe/ids/?datasource=tranquility',
            { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify([fcName]) }
          );
          if (!esiRes.ok) throw new Error(`ESI ${esiRes.status}`);
          const data   = await esiRes.json();
          const fcChar = (data.characters || [])[0];
          if (!fcChar?.id) throw new Error(`Character not found: ${fcName}`);
          await window.eveAPI.openCharacterInfoWindow(charId, fcChar.id);
        } catch (e) { errors.push('Fleet: ' + e.message); }
      }

      const systemName = extractSystemName(pingData.formup);
      if (systemName) {
        try {
          const accounts = await window.eveAPI.getAccounts().catch(() => []);
          const charId   = accounts[0]?.characterId;
          if (!charId) throw new Error('No character — add a character first');
          const systemId = await resolveSystemId(systemName);
          await window.eveAPI.setAutopilotDestination(charId, systemId);
          showFooterError('⊕ Waypoint set: ' + systemName);
        } catch (e) {
          errors.push('Waypoint: ' + e.message);
          showFooterError('Waypoint failed: ' + e.message);
        }
      }

      btn.disabled = false;
      if (errors.length) {
        btn.textContent = '⚠ Join'; btn.className = 'join-btn fail'; btn.title = errors.join('\n');
      } else {
        btn.textContent = '✓ Join'; btn.className = 'join-btn ok';
      }
      setTimeout(() => { btn.textContent = 'Join'; btn.className = 'join-btn'; btn.title = 'Open comms · Set waypoint · Find FC'; }, 4000);
    });

    // ── Receive data from main process ────────────────────────────────────────
    if (window.eveAPI && typeof window.eveAPI.on === 'function') {
      window.eveAPI.on('ping-alert-data', (msg) => populate(msg));
    }
    (async () => {
      try {
        if (window.eveAPI && typeof window.eveAPI.getPingAlertData === 'function') {
          const msg = await window.eveAPI.getPingAlertData();
          if (msg && (msg.raw_body || msg.body || msg.fc_name)) populate(msg);
          else populate({});
        } else {
          populate({});
        }
      } catch (e) { populate({}); }
    })();
  </script>
</body>
</html>
