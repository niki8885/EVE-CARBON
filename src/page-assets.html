<!-- ── Assets Page ─────────────────────────────────────────────────────────── -->
<div id="page-assets" class="nav-page"
     style="flex-direction:column; height:100%;">

  <!-- Header -->
  <div class="page-header">
    <div>
      <h2>Assets</h2>
      <div class="page-description">
        Loaded instantly from your local database — no ESI call.
        Sync characters on the Characters page to refresh.
      </div>
    </div>
    <button class="close-page-btn" onclick="closePage('assets')">✕</button>
  </div>

  <!-- Toolbar + Table -->
  <div class="page-content"
       style="display:flex; flex-direction:column; gap:0; height:100%; overflow:hidden;">

    <div class="asset-toolbar"
         style="display:flex; flex-wrap:wrap; align-items:center; gap:10px;
                padding:12px 16px; border-bottom:1px solid var(--border);
                background:var(--bg-card); flex-shrink:0;">
      <span id="assetSummary" class="asset-summary" style="margin-right:auto;">Loading assets…</span>

      <input type="text" id="assetSearch" class="field-input"
             style="width:220px; padding:7px 10px; font-size:13px;"
             placeholder="Search items, locations…" oninput="filterAssets()" />

      <select id="assetCharFilter" class="field-input"
              style="width:180px; padding:7px 10px; font-size:13px;"
              onchange="filterAssets()">
        <option value="">All Characters</option>
      </select>

      <select id="assetRegionFilter" class="field-input"
              style="width:160px; padding:7px 10px; font-size:13px;"
              onchange="filterAssets()">
        <option value="">All Regions</option>
      </select>

      <select id="assetCorpFilter" class="field-input"
              style="width:160px; padding:7px 10px; font-size:13px;"
              onchange="filterAssets()">
        <option value="">All Corps</option>
      </select>

      <button class="icon-btn" onclick="loadAssets()"
              title="Reload from local DB" style="padding:7px 14px; font-size:12px;">
        ⟳ RELOAD
      </button>
    </div>

    <!-- Table -->
    <div id="assetTableWrapper" class="asset-table-wrapper"
         style="flex:1; overflow-y:auto; overflow-x:auto;">
      <table id="assetTable" class="asset-table"
             style="table-layout:fixed; min-width:600px;">
        <!--
          colgroup gives the browser concrete column widths before JS fires.
          initAssetColResize() overrides these via th inline styles on every render,
          but having them here prevents columns collapsing to zero on first paint.
          Order: Icon | Item | Qty | Volume | Jita 4-4 Value
        -->
        <colgroup>
          <col style="width:40px;">
          <col style="width:320px;">
          <col style="width:80px;">
          <col style="width:110px;">
          <col style="width:150px;">
        </colgroup>
        <thead>
          <tr>
            <th class="th-icon"           draggable="true" data-col-key="icon" ><span class="col-resize-handle"></span></th>
            <th class="th-item"           draggable="true" data-col-key="item" >Item<span class="col-resize-handle"></span></th>
            <th class="th-right th-qty"   draggable="true" data-col-key="qty"  >Qty<span class="col-resize-handle"></span></th>
            <th class="th-right th-vol"   draggable="true" data-col-key="vol"  >Volume (m³)<span class="col-resize-handle"></span></th>
            <th class="th-right th-price" draggable="true" data-col-key="price">Jita 4-4 Value</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="5" class="loading-row">
              No assets loaded yet — sync a character on the Characters page first.
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

</div>

<script>
(function () {
  'use strict';

  /* ════════════════════════════════════════════════════════════════════════
     Asset table — column resize + reorder
     Public API (set on window after init):
       window.initAssetCols()   — call after every table re-render
  ════════════════════════════════════════════════════════════════════════ */

  /* ── Column definitions (order here = default visual order) ────────────── */
  var COL_DEFAULTS = [
    { key: 'icon',  width: 40  },
    { key: 'item',  width: 320 },
    { key: 'qty',   width: 80  },
    { key: 'vol',   width: 110 },
    { key: 'price', width: 150 }
  ];

  var STORAGE_WIDTHS = 'assetColWidths';   /* { key: px }        */
  var STORAGE_ORDER  = 'assetColOrder';    /* ['icon','item',…]  */

  /* ── Persistence helpers ────────────────────────────────────────────────── */
  function load(key, fallback) {
    try {
      var v = localStorage.getItem(key);
      return v ? JSON.parse(v) : fallback;
    } catch (e) { return fallback; }
  }
  function save(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
  }

  /* Return ordered array of {key,width} respecting saved order + saved widths */
  function resolvedCols() {
    var savedWidths = load(STORAGE_WIDTHS, {});
    var savedOrder  = load(STORAGE_ORDER,  null);

    /* Build a map of defaults for quick lookup */
    var defMap = {};
    COL_DEFAULTS.forEach(function (c) { defMap[c.key] = c; });

    var order;
    if (savedOrder && Array.isArray(savedOrder) &&
        savedOrder.length === COL_DEFAULTS.length &&
        savedOrder.every(function (k) { return defMap[k]; })) {
      order = savedOrder;
    } else {
      order = COL_DEFAULTS.map(function (c) { return c.key; });
    }

    return order.map(function (k) {
      return {
        key:   k,
        width: (typeof savedWidths[k] === 'number') ? savedWidths[k] : defMap[k].width
      };
    });
  }

  /* ── Apply current column order + widths to the DOM ────────────────────── */
  function applyColState(table, cols) {
    var tr   = table.querySelector('thead tr');
    var ths  = Array.from(tr.querySelectorAll('th'));
    var colg = Array.from(table.querySelectorAll('colgroup col'));

    /* Re-order <th> nodes to match cols array */
    cols.forEach(function (col, i) {
      var th = ths.find(function (t) { return t.dataset.colKey === col.key; });
      if (!th) return;
      /* Insert at position i inside the tr */
      var children = Array.from(tr.children);
      if (children.indexOf(th) !== i) {
        /* insertBefore the node currently at position i, or append */
        var ref = tr.children[i] || null;
        tr.insertBefore(th, ref);
      }
      th.style.width = col.width + 'px';
    });

    /* Re-order <col> elements to match */
    cols.forEach(function (col, i) {
      var colEl = colg.find(function (c) { return c.dataset.colKey === col.key; });
      if (!colEl) return;
      var cg = colEl.parentNode;
      var ref = cg.children[i] || null;
      if (cg.children[i] !== colEl) cg.insertBefore(colEl, ref);
      colEl.style.width = col.width + 'px';
    });

    /* Re-order <td> cells in every body row to match new column order */
    reorderBodyRows(table, cols);
  }

  /* Reorder td cells in tbody to match header order */
  function reorderBodyRows(table, cols) {
    var rows = table.querySelectorAll('tbody tr');
    rows.forEach(function (row) {
      /* Skip spanning rows (loading/empty messages) */
      var tds = Array.from(row.querySelectorAll('td'));
      if (tds.length !== cols.length) return;

      cols.forEach(function (col, i) {
        var td = tds.find(function (t) { return t.dataset.colKey === col.key; });
        if (!td) return;
        var ref = row.children[i] || null;
        if (row.children[i] !== td) row.insertBefore(td, ref);
      });
    });
  }

  /* ── Tag existing <col> elements with data-col-key (matches th order) ──── */
  function tagColElements(table) {
    var ths  = table.querySelectorAll('thead th');
    var cols = table.querySelectorAll('colgroup col');
    ths.forEach(function (th, i) {
      if (cols[i]) cols[i].dataset.colKey = th.dataset.colKey || '';
    });
  }

  /* ── RESIZE ─────────────────────────────────────────────────────────────── */
  function attachResizeHandles(table, cols) {
    var handles = table.querySelectorAll('.col-resize-handle');
    handles.forEach(function (handle) {
      var fresh = handle.cloneNode(true);
      handle.parentNode.replaceChild(fresh, handle);

      fresh.addEventListener('mousedown', function (e) {
        e.preventDefault();
        e.stopPropagation(); /* don't fire th dragstart */

        var th     = fresh.closest('th');
        var key    = th.dataset.colKey;
        var startX = e.clientX;
        var startW = th.offsetWidth;

        var overlay = document.createElement('div');
        overlay.style.cssText =
          'position:fixed;top:0;left:0;width:100%;height:100%;cursor:col-resize;z-index:9999;user-select:none';
        document.body.appendChild(overlay);
        fresh.classList.add('dragging');

        function onMove(ev) {
          var newW = Math.max(40, startW + (ev.clientX - startX));
          var col  = cols.find(function (c) { return c.key === key; });
          if (col) col.width = newW;
          th.style.width = newW + 'px';
          /* Also update the <col> element */
          var colEl = table.querySelector('col[data-col-key="' + key + '"]');
          if (colEl) colEl.style.width = newW + 'px';
        }

        function onUp() {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup',   onUp);
          fresh.classList.remove('dragging');
          document.body.removeChild(overlay);
          /* Persist only widths */
          var widthMap = {};
          cols.forEach(function (c) { widthMap[c.key] = c.width; });
          save(STORAGE_WIDTHS, widthMap);
        }

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup',   onUp);
      });
    });
  }

  /* ── REORDER ────────────────────────────────────────────────────────────── */
  function attachReorderHandles(table, cols) {
    var tr         = table.querySelector('thead tr');
    var dragSrcKey = null;

    /* Visual drop-indicator line */
    var indicator = document.createElement('div');
    indicator.style.cssText =
      'position:absolute;top:0;width:2px;height:100%;background:var(--accent,#4ecbb0);' +
      'pointer-events:none;display:none;z-index:10;transform:translateX(-1px)';
    /* We'll position it relative to the thead */
    var thead = table.querySelector('thead');
    thead.style.position = 'relative';
    thead.appendChild(indicator);

    function thsInOrder() { return Array.from(tr.querySelectorAll('th')); }

    function showIndicator(targetTh, insertBefore) {
      var rect      = targetTh.getBoundingClientRect();
      var theadRect = thead.getBoundingClientRect();
      var x = insertBefore
        ? rect.left  - theadRect.left
        : rect.right - theadRect.left;
      indicator.style.left    = x + 'px';
      indicator.style.height  = thead.offsetHeight + 'px';
      indicator.style.display = 'block';
    }

    function hideIndicator() { indicator.style.display = 'none'; }

    thsInOrder().forEach(function (th) {
      th.addEventListener('dragstart', function (e) {
        /* If the mousedown was on a resize handle, cancel drag */
        if (e.target.classList.contains('col-resize-handle')) {
          e.preventDefault(); return;
        }
        dragSrcKey = th.dataset.colKey;
        th.classList.add('col-dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', dragSrcKey);
      });

      th.addEventListener('dragend', function () {
        th.classList.remove('col-dragging');
        thsInOrder().forEach(function (t) { t.classList.remove('col-drag-over'); });
        hideIndicator();
        dragSrcKey = null;
      });

      th.addEventListener('dragover', function (e) {
        if (!dragSrcKey || dragSrcKey === th.dataset.colKey) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';

        /* Determine if we're in the left or right half */
        var rect       = th.getBoundingClientRect();
        var insertBefore = (e.clientX - rect.left) < rect.width / 2;
        showIndicator(th, insertBefore);
        th.dataset.dropSide = insertBefore ? 'before' : 'after';
        thsInOrder().forEach(function (t) { t.classList.remove('col-drag-over'); });
        th.classList.add('col-drag-over');
      });

      th.addEventListener('dragleave', function () {
        th.classList.remove('col-drag-over');
        hideIndicator();
      });

      th.addEventListener('drop', function (e) {
        e.preventDefault();
        hideIndicator();
        th.classList.remove('col-drag-over');

        var srcKey  = dragSrcKey;
        var destKey = th.dataset.colKey;
        if (!srcKey || srcKey === destKey) return;

        var insertBefore = th.dataset.dropSide !== 'after';

        /* Reorder cols array */
        var srcIdx  = cols.findIndex(function (c) { return c.key === srcKey;  });
        var destIdx = cols.findIndex(function (c) { return c.key === destKey; });
        var moved   = cols.splice(srcIdx, 1)[0];
        var newDest = cols.findIndex(function (c) { return c.key === destKey; });
        var insertAt = insertBefore ? newDest : newDest + 1;
        cols.splice(insertAt, 0, moved);

        /* Persist new order */
        save(STORAGE_ORDER, cols.map(function (c) { return c.key; }));

        /* Re-render column positions */
        applyColState(table, cols);

        /* Re-attach all handlers since DOM nodes moved */
        attachResizeHandles(table, cols);
        attachReorderHandles(table, cols);
      });
    });
  }

  /* ── Main init ──────────────────────────────────────────────────────────── */
  function initAssetCols() {
    var table = document.getElementById('assetTable');
    if (!table) return;

    tagColElements(table);

    var cols = resolvedCols();
    applyColState(table, cols);
    attachResizeHandles(table, cols);
    attachReorderHandles(table, cols);
  }

  /* ── Expose on window — pageLoader.js calls initAssetCols() after inject ── */
  /* DO NOT auto-call here: this script runs during innerHTML injection,        */
  /* before nodes are in the live DOM, so getElementById returns null.          */
  window.initAssetColResize = initAssetCols;   /* legacy alias */
  window.initAssetCols      = initAssetCols;

})();
</script>
